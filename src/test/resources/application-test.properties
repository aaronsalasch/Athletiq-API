# ===== H2 en modo PostgreSQL =====
spring.datasource.url=jdbc:h2:mem:athletiq_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT — mismo formato que producción
athletiq.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
athletiq.jwt.expiration=86400000

# Deshabilitar Swagger en tests
springdoc.api-docs.enabled=false

# Logging reducido
logging.level.com.athletiq=DEBUG
logging.level.org.springframework.security=WARN
