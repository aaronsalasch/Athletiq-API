# ===== SERVER =====
server.port=8080

# ===== DATASOURCE =====
spring.datasource.url=jdbc:postgresql://localhost:5432/athletiq_db
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== JWT =====
# Genera un secret de al menos 256 bits (32+ chars en Base64)
athletiq.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
athletiq.jwt.expiration=86400000

# ===== SCHEDULING =====
spring.task.scheduling.pool.size=5

# ===== CORS =====
athletiq.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ===== SWAGGER UI =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method

# ===== ASYNC =====
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=athletiq-async-

# ===== FILE UPLOADS =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
